<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 3 - DOM Manipulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="main-container">
        <h1 id="main-heading">Dynamic DOM Manipulation</h1>
        
        <p id="main-paragraph">
            This is a paragraph that you can show, hide, or manipulate.
            The Document Object Model (DOM) connects web pages to scripts!
        </p>
        
        <div class="controls">
            <input type="text" id="text-input" placeholder="Type something to change heading...">
            
            <button id="btn-heading">Change Heading Text</button>
            <button id="btn-bg">Change Background Color</button>
            <button id="btn-fontsize">Increase Font Size</button>
            <button id="btn-toggle">Show/Hide Paragraph</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
