<!DOCTYPE html>
<html>
<head>
    <title>Sum of N Numbers</title>
</head>
<style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        input, button {
            padding: 10px;
            margin-top: 10px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #007BFF;
            color: white;
            cursor: pointer;
            border: none;
        }
        button:hover {
            background-color: #0056b3;
        }
        #result {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

    <h2>Sum of Numbers from 1 to N</h2>

    <label>Enter N: </label>
    <input type="number" id="num">
    <button onclick="calculateSum()">Calculate</button>

    <p id="result"></p>

    <script>
        function calculateSum() {
            let n = parseInt(document.getElementById("num").value);
            let sum = 0;

            for (let i = 1; i <= n; i++) {
                sum += i;
            }

            document.getElementById("result").innerHTML =
                "Sum of numbers from 1 to " + n + " = " + sum;
        }
    </script>

</body>
</html>
