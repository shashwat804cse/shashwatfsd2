<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 2 - Employee Records</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Employee Directory</h1>
        
        <div class="form-section">
            <h3>Add New Employee</h3>
            <div class="input-grid">
                <input type="text" id="emp-name" placeholder="Employee Name">
                <input type="text" id="emp-id" placeholder="Employee ID">
                <input type="number" id="emp-salary" placeholder="Salary (₹)">
                <input type="text" id="emp-dept" placeholder="Department">
            </div>
            <button id="btn-add">Add Employee</button>
        </div>

        <div class="actions-section">
            <h3>Actions</h3>
            <button id="btn-show-all">Display All Employees</button>
            <button id="btn-filter-salary">Filter Salary > ₹50,000</button>
            <button id="btn-total-payout">Total Salary Payout</button>
            <button id="btn-avg-salary">Average Salary</button>
            <div class="inline-action">
                <input type="text" id="filter-dept" placeholder="Enter Dept to Count">
                <button id="btn-count-dept">Count Dept</button>
            </div>
        </div>

        <div class="results-section">
            <h3>Results</h3>
            <div id="output-box"><p>No data to display.</p></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
