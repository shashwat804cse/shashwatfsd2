<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 1 - Grade Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Student Grade Calculator</h1>
        
        <div id="setup-section">
            <label for="num-subjects">Enter Number of Subjects:</label>
            <input type="number" id="num-subjects" min="1" max="20" placeholder="e.g. 5">
            <button id="btn-next">Next</button>
        </div>

        <div id="marks-section" style="display: none;">
            <h3>Enter Marks (out of 100)</h3>
            <div id="marks-inputs"></div>
            <button id="btn-calculate">Calculate Result</button>
        </div>

        <div id="result-section" style="display: none;">
            <h2>Results</h2>
            <p><strong>Total Marks:</strong> <span id="res-total"></span></p>
            <p><strong>Average Marks:</strong> <span id="res-average"></span></p>
            <p><strong>Grade:</strong> <span id="res-grade"></span></p>
            <p><strong>Status:</strong> <span id="res-status"></span></p>
            <button id="btn-reset">Reset</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
